services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geophoto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geophoto}
      POSTGRES_DB: ${POSTGRES_DB:-geophoto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geophoto} -d ${POSTGRES_DB:-geophoto}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geophoto}:${POSTGRES_PASSWORD:-geophoto}@postgres:5432/${POSTGRES_DB:-geophoto}
      SECRET_KEY: ${SECRET_KEY:-changeme-replace-in-production}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
    driver: bridge
